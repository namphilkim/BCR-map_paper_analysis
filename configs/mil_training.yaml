# Default MIL config (HiPT ViT-B/16). Override via CLI.
data:
  # Ephemeral per-run copies of symlinks to .h5 embeddings (see MILDataModule)
  root: "./run_data/"
  # Folders of BCR-map images + matching .h5 patch embeddings (set via CLI or env in scripts)
  datapath: "./data/mil_embeddings/"
  fold: 0
  num_classes: 4

  # MIL-specific parameters
  patch_size: 224
  stride: 224  # Non-overlapping patches (stride = patch_size)
  min_patches: 1000
  max_patches: 10000
  random_sampling: true  # Use random sampling during training

  # Data augmentation
  flip_prob: 0.5
  rand_aug_n: 2
  rand_aug_m: 9
  use_trivial_aug: false

  # DataLoader settings
  batch_size: 4  # Smaller batch size for MIL
  workers: 4

  # Normalization (ImageNet defaults; precomputed .h5 embeddings ignore this)
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Model configuration for MIL
model:
  model_name: "vit-b16-224-in21k"
  freeze_backbone: true
  feature_dim: null

  aggregation_method: "hipt"  # default: hierarchical ViT aggregation (paper)
  hidden_dim: 256
  attention_dim: 128
  transformer_heads: 8
  transformer_layers: 2

  n_classes: 4

  optimizer: "adamw"
  lr: 1e-4
  weight_decay: 1e-4
  scheduler: "cosine"
  warmup_steps: 100
  label_smoothing: 0.0

trainer:
  max_epochs: 1000
  accelerator: "gpu"
  devices: 1
  precision: 16
  logger:
    - class_path: pytorch_lightning.loggers.CSVLogger
      init_args:
        save_dir: logs
    - class_path: pytorch_lightning.loggers.WandbLogger
      init_args:
        project: BCR_map_paper_analysis

  check_val_every_n_epoch: 1
  val_check_interval: 1.0

  log_every_n_steps: 10
  enable_progress_bar: true
  enable_model_summary: true

k_folds: 3
run_test: false
version: "mil_hipt_vit_b16"

model_checkpoint:
  monitor: "val_acc"
  mode: "max"
  save_top_k: 1
  save_last: true
  filename: "fold-{fold}-epoch-{epoch:02d}-val_acc-{val_acc:.4f}"
